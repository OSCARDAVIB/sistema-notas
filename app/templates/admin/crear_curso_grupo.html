{% extends "base.html" %}

{% block title %}Nuevo Curso/Grupo{% endblock %}

{% block content %}
<<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill"></i> Sistema Académico</a>
        <div class="navbar-nav ms-auto">
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-layers"></i> Nuevo Curso</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('admin.crear_curso_grupo') }}">
                        
                        <!-- GRADO -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Grado:</label>
                                <select class="form-select" name="grado" required>
                                    <option value="PRIMERO">PRIMERO</option>
                                    <option value="SEGUNDO">SEGUNDO</option>
                                    <option value="TERCERO">TERCERO</option>
                                    <option value="CUARTO">CUARTO</option>
                                    <option value="QUINTO">QUINTO</option>
                                    <option value="SEXTO">SEXTO</option>
                                    <option value="SEPTIMO">SEPTIMO</option>
                                    <option value="OCTAVO">OCTAVO</option>
                                    <option value="NOVENO">NOVENO</option>
                                    <option value="DECIMO">DECIMO</option>
                                    <option value="ONCE">ONCE</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Literal:</label>
                                <select class="form-select" name="literal" required>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                    <option value="E">E</option>
                                    <option value="F">F</option>
                                </select>
                            </div>
                        </div>

                        <!-- AÑO -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Año:</label>
                                <input type="number" class="form-control" name="ano_lectivo" value="2026" required>
                            </div>
                        </div>

                        <!-- JORNADA -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Jornada:</label>
                            <select class="form-select" name="jornada" required>
                                <option value="MAÑANA">MAÑANA</option>
                                <option value="TARDE">TARDE</option>
                                <option value="NOCHE">NOCHE</option>
                                <option value="UNICA">UNICA</option>
                            </select>
                        </div>

                        <!-- SEDE -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Sede:</label>
                            <select class="form-select" name="sede" required>
                                <option value="PRINCIPAL">PRINCIPAL</option>
                                <option value="LA ZARCITA">LA ZARCITA</option>
                                <option value="EL BRASIL">EL BRASIL</option>
                                <option value="EL PARAISO">EL PARAISO</option>
                            </select>
                        </div>

                        <!-- DIRECTOR DE GRUPO -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Director de Grupo:</label>
                            <select class="form-select" name="director_grupo_id">
                                <option value="">(SIN ASIGNAR)</option>
                                {% for docente in docentes %}
                                <option value="{{ docente.id }}">{{ docente.nombre_completo() }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- BOTONES -->
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('admin.cursos') }}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Volver
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
