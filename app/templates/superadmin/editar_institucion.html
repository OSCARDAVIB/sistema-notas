{% extends "base.html" %}

{% block title %}Editar Institución - Super Admin{% endblock %}

{% block content %}
<<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-mortarboard-fill"></i> Sistema Académico
        </a>
        <div class="navbar-nav ms-auto">
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-building-gear"></i> Editar Institución</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre de la Institución *</label>
                                <input type="text" class="form-control" name="nombre" value="{{ institucion.nombre }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Código DANE</label>
                                <input type="text" class="form-control" name="codigo_dane" value="{{ institucion.codigo_dane or '' }}">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">NIT</label>
                                <input type="text" class="form-control" name="nit" value="{{ institucion.nit or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" class="form-control" name="telefono" value="{{ institucion.telefono or '' }}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <textarea class="form-control" name="direccion" rows="2">{{ institucion.direccion or '' }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" value="{{ institucion.email or '' }}">
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="activa" id="activa" {% if institucion.activa %}checked{% endif %}>
                            <label class="form-check-label" for="activa">Institución Activa</label>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('superadmin.instituciones') }}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Volver
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
