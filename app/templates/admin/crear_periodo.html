{% extends "base.html" %}

{% block title %}Crear Periodo Académico{% endblock %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill"></i> Sistema Académico</a>
        <div class="navbar-nav ms-auto">
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-calendar-plus"></i> Crear Periodo Académico</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Año Lectivo *</label>
                                <input type="number" class="form-control" name="ano_lectivo" value="2026" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Número de Periodo *</label>
                                <select class="form-select" name="numero_periodo" required>
                                    <option value="1">1 - Primer Periodo</option>
                                    <option value="2">2 - Segundo Periodo</option>
                                    <option value="3">3 - Tercer Periodo</option>
                                    <option value="4">4 - Cuarto Periodo</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Nombre del Periodo</label>
                            <input type="text" class="form-control" name="nombre" placeholder="Ej: Primer Periodo">
                        </div>
                        
                                                <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Fecha de Inicio *</label>
                                <input type="date" class="form-control" name="fecha_inicio" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Fecha de Fin *</label>
                                <input type="date" class="form-control" name="fecha_fin" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Fecha Cierre Notas *</label>
                                <input type="date" class="form-control" name="fecha_cierre_notas" required>
                                <div class="form-text text-danger"><strong>Fecha limite para que docentes suban notas.</strong></div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Porcentaje del Año (%)</label>
                            <input type="number" class="form-control" name="porcentaje" value="25" min="1" max="100" step="0.01">
                            <div class="form-text">Porcentaje que representa este periodo en el año lectivo.</div>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('admin.periodos') }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Crear Periodo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
