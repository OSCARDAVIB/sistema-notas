{% extends "base.html" %}

{% block title %}Crear Grupo{% endblock %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill"></i> Sistema Académico</a>
        <div class="navbar-nav ms-auto">
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-people-fill"></i> Crear Nuevo Grupo</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Curso *</label>
                            <select class="form-select" name="curso_id" required>
                                <option value="">Seleccione un curso...</option>
                                {% for curso in cursos %}
                                <option value="{{ curso.id }}">{{ curso.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Nombre del Grupo *</label>
                            <input type="text" class="form-control" name="nombre" placeholder="Ej: 6-1" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Código</label>
                            <input type="text" class="form-control" name="codigo" placeholder="Ej: A, B, 1, 2">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Año Lectivo *</label>
                            <input type="number" class="form-control" name="ano_lectivo" value="2026" required>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('admin.grupos') }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Crear Grupo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
